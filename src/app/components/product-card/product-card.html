<div class="card">
  <img [src]="product.image" [alt]="product.name" />

  <h3>{{ product.name }}</h3>

  <p class="price">₹{{ product.price }}</p>

  <p class="description">
    {{ product.description }}
  </p>

  <div class="actions">
    <button (click)="viewDetails()">
      View Details
    </button>

    <button (click)="addToCart()">
      Add To Cart
    </button>
  </div>
</div>
